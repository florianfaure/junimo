detail: >-
  QUOI: scanner TOUT l historique git (130 commits) avant publication publique. COMMENT: (1)
  gitleaks detect --source . --log-opts=--all (installer via brew install gitleaks si absent) ; (2)
  revue manuelle ciblée: git log -p -- src-tauri/tauri.conf.json src-tauri/capabilities puis grep de
  motifs (sk-ant-, ghp_, gho_, AKIA, BEGIN.*PRIVATE KEY, password=, token=) sur git log -p --all ;
  (3) vérifier qu aucun fichier .env/credentials n a jamais été tracké: git log --all
  --diff-filter=A --name-only | grep -iE env\|secret\|credential. LIVRABLE: rapport écrit dans le
  scratchpad (chemin dans l outcome) listant chaque hit et son verdict (faux positif justifié / vrai
  secret). DONE: zéro vrai secret confirmé, ou ESCALADE immédiate à l orchestrateur sans rien
  pousser. Gate bloquante de la tâche de publication. Ne PAS modifier de fichier: tâche read-only.
