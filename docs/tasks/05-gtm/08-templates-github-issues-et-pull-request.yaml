detail: >-
  QUOI: templates en ANGLAIS sous .github/ : (1) ISSUE_TEMPLATE/bug_report.yml (form YAML GitHub:
  description, steps to reproduce, expected/actual, macOS version, app version, logs) ; (2)
  ISSUE_TEMPLATE/feature_request.yml (problem, proposed solution, alternatives) ; (3)
  ISSUE_TEMPLATE/config.yml (blank_issues_enabled: true) ; (4) PULL_REQUEST_TEMPLATE.md (what/why,
  screenshots si UI, checklist: CI verte, testé sur macOS). DONE: YAMLs syntaxiquement valides
  (python3 -c import yaml,sys; yaml.safe_load(open(sys.argv[1])) sur chacun), champs conformes au
  schéma GitHub issue forms (type textarea/input/dropdown avec id et attributes.label).
