detail: >-
  QUOI: .github/workflows/ci.yml déclenché sur push main + pull_request. JOB unique sur
  macos-latest: checkout, setup-node@v4 (node 22, cache npm), rust stable via dtolnay/rust-toolchain
  + Swatinem/rust-cache (workspaces: src-tauri), npm ci, npm run build (fait tsc && vite build),
  cargo test --manifest-path src-tauri/Cargo.toml. ATTENTION: le build Tauri complet (npm run tauri
  build) est trop lourd pour la CI de PR — ne PAS l inclure ici, il appartient au workflow de
  release. Vérifier si cargo test nécessite des libs système (webkit) — si oui se limiter à cargo
  test --lib ou ajouter les deps documentées Tauri v2 macOS. DONE: actionlint passe sur le fichier
  (brew install actionlint si absent) ; la validation réelle en ligne arrivera au premier push
  (tâche publication).
