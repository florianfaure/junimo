detail: >-
  Redessiner le sprite de base en pixel art net (grille propre, palette limitée) en 2-3 formes
  (classique, rond, étoile), couleur interchangeable, 4+ accessoires en calques alignés sur la même
  grille (chapeau, nœud, lunettes, fleur). AMENDEMENT 2026-07-15 (orchestrateur, après arbitrage au
  dispatch) : les sprites et accessoires sont des grilles de pixels procédurales en TS (rôles
  contour/ombre/base/highlight) rendues au canvas — pas de fichiers PNG ; le palette swap en découle
  trivialement et les calques restent des couches logiques superposées. Livrable : module
  framework-agnostic src/junimo/ (model.ts pur + compose.ts canvas) exportant composeJunimo({shape,
  color, accessory}) vers canvas/dataURL et les constantes JUNIMO_SHAPES, JUNIMO_COLORS (8+),
  JUNIMO_ACCESSORIES — interface consommée par la tâche éditeur. Page de démo statique montrant la
  grille des combinaisons. Done : démo nette en 1x et 2x (image-rendering pixelated), module
  utilisable hors React.
