detail: >-
  Reproduire exactement la référence pixel-art fournie par Florian dans la silhouette classic de
  src/junimo/model.ts (silhouettes, buildBodyRoles, metricsFor). Traits obligatoires : tige noire
  coudée sur le dessus avec pointe verte décalée à gauche ; calotte vert foncé avec bande highlight
  vert clair en dessous ; corps vert vif arrondi, plus large en bas ; contour sombre continu ; deux
  yeux noirs carrés ; joues roses sous les yeux ; petite bouche sombre ; deux petits bras-nubs
  sombres sortant des flancs ; deux pieds-nubs sombres sous le corps. Grille indicative 16x16
  transcrite par l'orchestrateur depuis la référence (legende : point=vide K=contour sombre D=vert
  fonce G=vert corps L=vert clair P=rose T=tige) : ......TK........ / .......K........ /
  .....KKKKK...... / ...KKDDKDDKK.... / ..KDDLLKLLDDK... / ..KDLLLKLLLDK... / .KGLLLLLLLLLGK.. /
  .KGGGGGGGGGGGK.. / KKGGKGGGGGKGGKK. / .KGGKGGGGGKGGK.. / .KPPGGGGGGGPPK.. / .KGGGGGKKGGGGK.. /
  ..KGGGGGGGGGK... / ...KKKKKKKKK.... / ....KK....KK.... / ................ — cette grille est
  INDICATIVE : la source de vérité est la comparaison visuelle avec les images de référence,
  détenues par l'orchestrateur. Process impératif : itérer avec scripts/gen_junimo_preview.ts,
  livrer les previews, l'orchestrateur (Fable) valide contre la référence avant le done. Deuxième
  référence (pose bras levés) : à encoder comme pose celebrate réutilisable (consommée par la tâche
  49). Les formes round et star deviennent des variantes dérivées : même visage (yeux/joues/bouche),
  même tige, seule la silhouette du corps change. La palette swap existante (#32) doit continuer de
  fonctionner. Done : npm run build + previews validées par l'orchestrateur. Spec section 6.
