detail: >-
  Thème Astryx custom clean/tech : tokens (couleur, typo, radius, motion) sur base neutral avec
  accents personnalisés, dark mode natif, layout accueil retravaillé. Supprimer le thème pixel
  global (parchemin, bordures 9-slice, police Press Start 2P sur les titres), supprimer le
  sous-titre « tableau de bord Claude Code ». Header : junimo (sprite pixelated, seul élément pixel
  art de l'UI) + nom personnalisé (défaut « Junimo », valeur par défaut ici, branché sur les
  réglages par la tâche éditeur). Inspiration : Blume, Figma figpal. Done : captures avant/après en
  light et dark, revue visuelle.
