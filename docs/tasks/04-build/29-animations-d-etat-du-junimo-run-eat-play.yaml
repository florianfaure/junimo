outcome: >-
  Machine à états d'animation du junimo : mood dérivé du snapshot dans le nouveau hook useJunimoMood
  (eat sur delta de tokens 6s, run si activité <2min, celebrate 8s au passage actif→silencieux,
  bored >15min, play seedé horloge sans Math.random, idle défaut), frames programmatiques par état
  dans model.ts (run foulée+lignes de vitesse, eat jeton mâché, play jonglage, celebrate bras
  levés+étincelles réutilisant la pose #45, bored assis+regards+Zzz), cadence par mood dans
  JunimoSprite, mode démo ?anim=. Isolation #42 respectée (App.tsx/useOverlayData intacts côté
  agent) ; branchement snapshot/nowIso → Header fait par l'orchestrateur après merge.
verification: >-
  npm run build OK ; planche mood-sheet (6 états x frames) validée visuellement par l'orchestrateur
  ; état bored vérifié au runtime dans le header via ?anim=bored en Chrome headless sur le build.
