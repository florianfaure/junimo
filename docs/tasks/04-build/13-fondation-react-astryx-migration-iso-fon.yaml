detail: >-
  Migrer le shell front vanilla TS vers React + StyleX + Astryx (design system Meta,
  https://astryx.atmeta.com), rendu iso-fonctionnel. Fichiers : package.json, vite.config.ts (plugin
  React + StyleX), index.html, src/main.ts devient src/main.tsx + App.tsx, src/ui/*.ts deviennent
  des composants React sous src/components/ (Gauges, History, Projects, Mcps, Account,
  SettingsFooter) ; src/types.ts et src/ui/format.ts inchangés ; styles.css réduit au sprite junimo.
  Installer Astryx via son CLI, épingler les versions, vérifier la compat webview Tauri (npm run
  tauri dev). Conserver : polling 30 s + refresh à l'ouverture, états dégradés par section, badge
  staleError, sauvegarde des réglages, health-check MCPs opt-in. Contrat Snapshot intact. Interface
  attendue par les voisines : App porte un état de page (home seul ici, la tâche navigation ajoutera
  settings et junimo-editor) ; chaque section = composant recevant sa slice de Snapshot. Pas de
  polish visuel (tâche thème). Done : npm run build vert + overlay Tauri identique fonctionnellement
  (données réelles, réglages sauvegardables), captures.
