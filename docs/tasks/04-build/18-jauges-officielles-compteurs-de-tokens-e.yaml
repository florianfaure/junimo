  afficher « est. ». Fichiers : src-tauri/src/collector/oauth_usage.rs (to_gauge),
  mod.rs/snapshot.rs (merge), src/types.ts. Tests Rust sur le merge des deux sources (officiel seul,
  estimation seule, les deux). Front : pied de jauge officiel affiche « ≈ X / Y tok (est.) » à côté
  du reset. Done : cargo test vert + affichage réel en mode officiel.
