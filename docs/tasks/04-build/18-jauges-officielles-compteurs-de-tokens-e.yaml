detail: >-
  Compteurs de tokens en mode officiel. Rust : dans le collector, quand les jauges officielles
  /usage sont actives, calculer aussi l'estimation locale (déjà produite pour le mode repli) et
  remplir used_tokens/cap des Gauge officielles avec ces valeurs estimées ; percent et reset_at
