detail: >-
  Compteurs de tokens en mode officiel. Rust : dans le collector, quand les jauges officielles
  /usage sont actives, calculer aussi l'estimation locale (déjà produite pour le mode repli) et
  remplir used_tokens/cap des Gauge officielles avec ces valeurs estimées ; percent et reset_at
  restent officiels ; ajouter un marqueur (ex. tokens_source: estimated) pour que le front sache
  afficher « est. ». Fichiers : src-tauri/src/collector/oauth_usage.rs (to_gauge),
  mod.rs/snapshot.rs (merge), src/types.ts. Tests Rust sur le merge des deux sources (officiel seul,
  estimation seule, les deux). Front : pied de jauge officiel affiche « ≈ X / Y tok (est.) » à côté
  du reset. Done : cargo test vert + affichage réel en mode officiel.
