outcome: >-
  Câblage backend : OfficialUsageState managé dans run() (pattern AlertsState) ;
  assemble_snapshot(app, official_max_age) appelle oauth_usage::resolve puis apply_official après
  build_snapshot, avec repli degraded 'official_usage_unavailable' (chaîne non détectée par
  render.ts, qui ne matche que 'gauges') si l'état est absent ou l'API indisponible. get_snapshot
  passe max_age=55s (< poll front 60s, gigue absorbée) ; le thread de fond (tick 60s inchangé,
  pilote les alertes) passe max_age=300s pour découpler le tick d'affichage du fetch réseau réel.
  alerts::send_notification prend désormais la Gauge (plus seulement percent) et choisit 'quota
  officiel' vs 'estimation locale' via GaugeSource ; tests source_label ajoutés, import GaugeSource
  dédupliqué dans le module de tests.
