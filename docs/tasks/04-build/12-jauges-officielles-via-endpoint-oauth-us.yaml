detail: >-
  Remplacer les jauges estimées localement par les données officielles du compte (GET
  api.anthropic.com/api/oauth/usage, token OAuth Claude Code en lecture seule
  Keychain/.credentials.json, jamais de refresh). Mode officiel : % + reset uniquement (reset 5h en
  durée restante, null = aucune session en cours). Fallback estimation locale taguée « estimé »
  (cache 10 min anti-flicker). Cadence 60s visible / 5min fond. Plan approuvé :
  ~/.claude/plans/refonte-des-jauges-d-utilisation-swirling-nova.md
