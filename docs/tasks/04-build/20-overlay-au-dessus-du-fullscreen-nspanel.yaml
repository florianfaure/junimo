detail: >-
  Ouvrir l'overlay au-dessus des apps fullscreen : convertir la fenêtre overlay en NSPanel
  non-activant (crate tauri-nspanel ou objc2 direct) avec collectionBehavior canJoinAllSpaces +
  fullScreenAuxiliary et niveau de fenêtre adapté. Fichiers : src-tauri/Cargo.toml,
  src-tauri/src/lib.rs, tray.rs (toggle), vérifier shortcut.rs (raccourci global) et le blur-close.
  Done : une app en fullscreen (ex. Safari plein écran), clic sur l'icône tray, l'overlay apparaît
  par-dessus sans changer de Space ; le blur le referme ; le raccourci global fonctionne toujours ;
  comportement inchangé hors fullscreen.
