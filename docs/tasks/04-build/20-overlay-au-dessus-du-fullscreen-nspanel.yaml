      canJoinAllSpaces|fullScreenAuxiliary|stationary|ignoresCycle + level>=25 + jamais
      NSApp.activate ; blur-close = window_did_resign_key ET NSEvent global monitor
      LeftMouseDown|RightMouseDown (Focused(false) non fiable, becomes_key_only_if_needed peut
      empêcher resignKey). Transmis à l'agent implémenteur.
