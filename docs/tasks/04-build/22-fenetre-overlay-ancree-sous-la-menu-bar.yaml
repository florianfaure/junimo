commit: HEAD
outcome: >-
  Ancrage manuel de l'overlay sous la menu bar, centré sur l'icône tray : trace propre du rect tray
  (TRAY_RECT, alimenté par les évènements souris — l'état du positioner est privé), y = bas de
  l'icône = bas de la menu bar, clamp aux bornes du moniteur, gardes #37 conservées. TrayCenter et
  TrayBottomCenter du positioner replient tous deux y sur le haut de l'icône sur macOS (vérifié dans
  les sources), d'où le calcul manuel. Fallback documenté : rect inconnu (1er toggle via raccourci)
  = pas de repositionnement.
verification: >-
  cargo build sans erreur ni warning ; espace de coordonnées vérifié par l'orchestrateur dans les
  sources de tray-icon 0.24.1 (get_tray_rect émet du physique via to_physical(scale_factor),
  macos/mod.rs:515-527) — le to_physical(1.0) de l'agent est bien un no-op correct sur Retina.
