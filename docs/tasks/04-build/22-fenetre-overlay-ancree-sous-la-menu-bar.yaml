  tray pour x centré sur l'icône, y = bas de la menu bar). Impératif : conserver la garde anti-panic
  #37 (current_monitor() indéterminé pour le NSPanel caché) et le sauvetage hors-écran au toggle.
  Done : cargo build ok + lancement réel — au toggle la fenêtre apparaît entièrement sous la menu
  bar, alignée sur l'icône, sans régression #37. Spec section 1.
