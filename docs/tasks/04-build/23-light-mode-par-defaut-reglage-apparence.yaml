detail: >-
  Le thème ne suit plus le système : light par défaut. Ajouter un champ appearance (light ou dark,
  défaut light) dans les settings (struct Rust côté src-tauri + types front src/types.ts), un
  contrôle « Apparence » dans SettingsForm.tsx, application via attribut data-theme sur la racine
  (main.tsx / index.html). Supprimer toute dépendance à light-dark() : src/styles.css et
  src/theme/junimoTheme.ts puis regénérer avec astryx theme build (junimo.theme.css ne s'édite
  jamais à la main). Résout la dette #36 (baseline macOS 13.3) — l'orchestrateur clôturera #36 après
  vérification. Done : npm run build + app démarre en light, bascule dark dans Réglages persistée
  après relance. Spec section 2.
