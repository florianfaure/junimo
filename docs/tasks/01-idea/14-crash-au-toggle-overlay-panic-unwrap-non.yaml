commit: HEAD
outcome: >-
  Cause racine complète (instrumentation sur clics réels) : en multi-moniteurs à DPI mixtes,
  TrayCenter du positioner peut projeter la fenêtre hors de tout écran (observé y=-4320, taille
  doublée par changement d'échelle) ; une fois hors écran, current_monitor()=None fait paniquer la
  crate (unwrap ext.rs:155) — ou, avec la première garde, laissait la fenêtre naufragée invisible.
  Fix final : rescue_if_offscreen (ancrage haut-droite du moniteur du curseur via
  cursor_position/monitor_from_point) appelé avant ET après le positionnement, TrayCenter tenté
  seulement si moniteur résolu
verification: >-
  Diagnostic sur logs instrumentés de 2 clics réels de Florian ; après fix : cargo test 130/0, cargo
  build vert, toggle vérifié par Florian (« ça marche, il s'ouvre bien »)
