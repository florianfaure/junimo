name: ci

# Vérifie chaque push sur main et chaque pull request : typecheck + build du
# front (tsc && vite build) puis les tests Rust du backend Tauri.
#
# ⚠️ PAS de `npm run tauri build` ici : le bundling complet de l'app (icônes,
# signature, .dmg) est trop lourd pour une CI de PR et relève du workflow de
# release (déclenché par tag, voir release.yml).
#
# `npm run build` tourne avant `cargo test` : il produit `dist/` (référencé
# par `frontendDist` dans tauri.conf.json). `cargo test` compile aussi le
# binaire Tauri (main.rs / lib.rs), donc autant lui fournir un `dist/` réel
# plutôt que de compter sur la tolérance de tauri-build en son absence.
# `src-tauri/tests/` ne contient que des fixtures (pas de *.rs) : les tests
# sont tous unitaires (#[cfg(test)]) dans les modules de `src-tauri/src/`,
# donc pas besoin de restreindre à `--lib`.

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck and build frontend
        run: npm run build

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
