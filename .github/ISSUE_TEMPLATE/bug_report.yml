name: Bug Report
description: Report a bug in Junimo
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: textarea
    id: bug_description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug here...
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Click on...
        2. Open...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: Describe the expected behavior...

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happens?
      placeholder: Describe the actual behavior...

  - type: input
    id: macos_version
    attributes:
      label: macOS Version
      description: Which version of macOS are you running? (e.g., Ventura 13.2, Sonoma 14.1)
      placeholder: "macOS Sonoma 14.1"
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App Version / Commit
      description: Which version of Junimo are you running? (e.g., v0.1.0 or commit hash)
      placeholder: "v0.1.0 or commit abc123"

  - type: textarea
    id: logs_screenshots
    attributes:
      label: Logs or Screenshots
      description: Any relevant logs, stack traces, or screenshots that help illustrate the problem.
      placeholder: Paste logs or drag-and-drop screenshots here...
